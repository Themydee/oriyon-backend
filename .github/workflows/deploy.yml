name: Deploy to EC2

on:
  push:
    branches:
      - master

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -e
            
            # Load NVM and Node/NPM/PM2 paths for non-interactive shell
            export NVM_DIR="$HOME/.nvm"
            [ -s "$NVM_DIR/nvm.sh" ] && \. "$NVM_DIR/nvm.sh"

            cd ~/oriyon-backend

            echo "================================================="
            echo "Pulling latest code..."
            echo "================================================="
            git pull origin master

            echo "================================================="
            echo "Installing dependencies..."
            echo "================================================="
            for dir in services/*/; do
              echo "Installing $dir..."
              (cd "$dir" && npm install) || { echo "❌ Install failed in $dir"; exit 1; }
            done

            echo "================================================="
            echo "Running migrations..."
            echo "================================================="
            for service in auth-service user-service lms-service applications-service notifications-service shop-service; do
              echo "Migrating $service..."
              (cd "services/$service" && npm run migrate) || { echo "❌ Migration failed in $service"; exit 1; }
            done

            echo "================================================="
            echo "Building services..."
            echo "================================================="
            for service in api-gateway auth-service user-service lms-service applications-service notifications-service shop-service; do
              echo "Building $service..."
              (cd "services/$service" && npm run build) || { echo "❌ Build failed in $service"; exit 1; }
            done

            echo "================================================="
            echo "Restarting PM2..."
            echo "================================================="
            pm2 restart all
            pm2 save

            echo "================================================="
            echo "Verifying services..."
            echo "================================================="
            sleep 5
            pm2 status

            echo "================================================="
            echo "✅ Deployment complete!"
            echo "================================================="