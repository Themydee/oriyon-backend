networks:
  oriyon-network:
    driver: bridge

volumes:
  pg-auth-data:
  pg-user-data:
  pg-lms-data:
  pg-applications-data:
  pg-notifications-data:
  rabbitmq-data:


services:
  # ─────────────────────────────────────────────
  # INFRASTRUCTURE
  # ─────────────────────────────────────────────

  rabbitmq:
    image: rabbitmq:3.13-management
    container_name: oriyon-rabbitmq
    restart: unless-stopped
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASS}
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
    networks:
      - oriyon-network
    healthcheck:
      test: [ "CMD", "rabbitmq-diagnostics", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5

  postgres-auth:
    image: postgres:16-alpine
    container_name: oriyon-postgres-auth
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: oriyon_auth
    volumes:
      - pg-auth-data:/var/lib/postgresql/data
    networks:
      - oriyon-network
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d oriyon_auth" ]
      interval: 10s
      timeout: 5s
      retries: 5

  postgres-user:
    image: postgres:16-alpine
    container_name: oriyon-postgres-user
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: oriyon_user
    volumes:
      - pg-user-data:/var/lib/postgresql/data
    networks:
      - oriyon-network
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d oriyon_user" ]
      interval: 10s
      timeout: 5s
      retries: 5

  postgres-lms:
    image: postgres:16-alpine
    container_name: oriyon-postgres-lms
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: oriyon_lms
    volumes:
      - pg-lms-data:/var/lib/postgresql/data
    networks:
      - oriyon-network
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d oriyon_lms" ]
      interval: 10s
      timeout: 5s
      retries: 5

  postgres-applications:
    image: postgres:16-alpine
    container_name: oriyon-postgres-applications
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: oriyon_applications
    volumes:
      - pg-applications-data:/var/lib/postgresql/data
    networks:
      - oriyon-network
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d oriyon_applications" ]
      interval: 10s
      timeout: 5s
      retries: 5

  postgres-notifications:
    image: postgres:16-alpine
    container_name: oriyon-postgres-notifications
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: oriyon_notifications
    volumes:
      - pg-notifications-data:/var/lib/postgresql/data
    networks:
      - oriyon-network
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d oriyon_notifications" ]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─────────────────────────────────────────────
  # MICROSERVICES
  # ─────────────────────────────────────────────

  api-gateway:
    build:
      context: .
      dockerfile: services/api-gateway/Dockerfile
    container_name: oriyon-api-gateway
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      PORT: 3000
      JWT_SECRET: ${JWT_SECRET}
      AUTH_SERVICE_URL: http://auth-service:3001
      USER_SERVICE_URL: http://user-service:3002
      LMS_SERVICE_URL: http://lms-service:3003
      APPLICATIONS_SERVICE_URL: http://applications-service:3004
      NOTIFICATIONS_SERVICE_URL: http://notifications-service:3005
    depends_on:
      auth-service:
        condition: service_started
      user-service:
        condition: service_started
      lms-service:
        condition: service_started
      applications-service:
        condition: service_started
      notifications-service:
        condition: service_started
    networks:
      - oriyon-network

  auth-service:
    build:
      context: .
      dockerfile: services/auth-service/Dockerfile
    container_name: oriyon-auth-service
    restart: unless-stopped
    ports:
      - "3001:3001"
    environment:
      PORT: 3001
      DATABASE_URL: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres-auth:5432/oriyon_auth
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      JWT_REFRESH_EXPIRES_IN: ${JWT_REFRESH_EXPIRES_IN}
      FRONTEND_URL: ${FRONTEND_URL}
      RABBITMQ_URL: amqp://${RABBITMQ_USER}:${RABBITMQ_PASS}@rabbitmq:5672
      USER_DATABASE_URL: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres-user:5432/oriyon_user
    depends_on:
      postgres-auth:
        condition: service_healthy
      postgres-user:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - oriyon-network

  user-service:
    build:
      context: .
      dockerfile: services/user-service/Dockerfile
    container_name: oriyon-user-service
    restart: unless-stopped
    ports:
      - "3002:3002"
    environment:
      PORT: 3002
      DATABASE_URL: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres-user:5432/oriyon_user
      JWT_SECRET: ${JWT_SECRET}
      RABBITMQ_URL: amqp://${RABBITMQ_USER}:${RABBITMQ_PASS}@rabbitmq:5672
      LMS_SERVICE_URL: http://lms-service:3003
    depends_on:
      postgres-user:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - oriyon-network

  lms-service:
    build:
      context: .
      dockerfile: services/lms-service/Dockerfile
    container_name: oriyon-lms-service
    restart: unless-stopped
    ports:
      - "3003:3003"
    environment:
      PORT: 3003
      DATABASE_URL: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres-lms:5432/oriyon_lms
      JWT_SECRET: ${JWT_SECRET}
      RABBITMQ_URL: amqp://${RABBITMQ_USER}:${RABBITMQ_PASS}@rabbitmq:5672
    depends_on:
      postgres-lms:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - oriyon-network

  applications-service:
    build:
      context: .
      dockerfile: services/applications-service/Dockerfile
    container_name: oriyon-applications-service
    restart: unless-stopped
    ports:
      - "3004:3004"
    environment:
      PORT: 3004
      DATABASE_URL: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres-applications:5432/oriyon_applications
      JWT_SECRET: ${JWT_SECRET}
      RABBITMQ_URL: amqp://${RABBITMQ_USER}:${RABBITMQ_PASS}@rabbitmq:5672
    depends_on:
      postgres-applications:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - oriyon-network

  notifications-service:
    build:
      context: .
      dockerfile: services/notifications-service/Dockerfile
    container_name: oriyon-notifications-service
    restart: unless-stopped
    ports:
      - "3005:3005"
    environment:
      PORT: 3005
      DATABASE_URL: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres-notifications:5432/oriyon_notifications
      JWT_SECRET: ${JWT_SECRET}
      RABBITMQ_URL: amqp://${RABBITMQ_USER}:${RABBITMQ_PASS}@rabbitmq:5672
      RESEND_API_KEY: ${RESEND_API_KEY}
      EMAIL_FROM: ${EMAIL_FROM}
      FRONTEND_URL: ${FRONTEND_URL}
    depends_on:
      postgres-notifications:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - oriyon-network
